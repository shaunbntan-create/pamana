<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login to PAMANA — Where Estate Comes Easy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1f2124;
    --ink-soft: #6b6f73;
    --accent: #2f5fe0;
    --field: #f1f2ee;
    --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    font-family: 'Figtree', system-ui, sans-serif;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    position: relative; overflow: hidden;
  }
  a { color: inherit; text-decoration: none; }

  /* blurred pointillist landscape backdrop */
  #bg { position: fixed; inset: -40px; width: calc(100% + 80px); height: calc(100% + 80px); object-fit: cover; filter: blur(26px) saturate(1.05) brightness(1.02); transform: scale(1.06); z-index: -2; }
  body::after { content: ""; position: fixed; inset: 0; background: rgba(240,241,236,.24); z-index: -1; }

  .card {
    display: grid; grid-template-columns: 300px 1fr;
    width: min(940px, 100%);
    background: var(--card);
    border-radius: 26px;
    overflow: hidden;
    box-shadow: 0 40px 90px -30px rgba(20,30,15,.5);
  }
  .art { position: relative; margin: 18px; border-radius: 18px; overflow: hidden; }
  .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  .panel { padding: 44px 52px 40px; display: flex; flex-direction: column; }
  .back { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: var(--ink); margin-bottom: 40px; width: fit-content; transition: gap .2s; }
  .back:hover { gap: 12px; }
  .login-to { font-size: 24px; font-weight: 500; color: var(--ink); margin: 0 0 6px; }
  h1 { font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: clamp(40px, 5vw, 58px); line-height: 1.02; letter-spacing: -.015em; margin: 0 0 30px; }

  .field { width: 100%; background: var(--field); border: 1px solid transparent; border-radius: 12px; padding: 15px 18px; font-family: inherit; font-size: 15.5px; color: var(--ink); margin-bottom: 14px; transition: border-color .2s, background .2s; }
  .field::placeholder { color: #9a9ea1; }
  .field:focus { outline: none; border-color: var(--accent); background: #fff; }

  .signup { font-size: 15px; color: var(--ink-soft); margin: 6px 0 0; }
  .signup a { color: var(--accent); font-weight: 600; }

  .foot { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; margin-top: auto; padding-top: 42px; }
  .lockup { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 26px; letter-spacing: .02em; }
  .lockup .logo-mark { width: 27px; height: 27px; display: block; flex: none; }
  .tag { font-size: 13.5px; line-height: 1.4; color: var(--ink-soft); max-width: 170px; text-align: right; }

  @media (max-width: 720px) {
    .card { grid-template-columns: 1fr; }
    .art { height: 180px; margin: 14px 14px 0; }
    .panel { padding: 30px 28px 32px; }
    .back { margin-bottom: 24px; }
    h1 { margin-bottom: 22px; }
    .foot { flex-direction: column; align-items: flex-start; }
    .tag { text-align: left; }
  }
</style>
</head>
<body>
  <img id="bg" src="scene.png" alt="" />

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="pmark" viewBox="0 0 27 27">
      <path d="M10.5 14 C13 11.6, 15.6 11.2, 17.4 9.9" stroke="#7fa24a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <g fill="#e5943c">
        <ellipse cx="9" cy="12" rx="2.2" ry="3.4" transform="rotate(0 9 15.5)"/>
        <ellipse cx="9" cy="12" rx="2.2" ry="3.4" transform="rotate(72 9 15.5)"/>
        <ellipse cx="9" cy="12" rx="2.2" ry="3.4" transform="rotate(144 9 15.5)"/>
        <ellipse cx="9" cy="12" rx="2.2" ry="3.4" transform="rotate(216 9 15.5)"/>
        <ellipse cx="9" cy="12" rx="2.2" ry="3.4" transform="rotate(288 9 15.5)"/>
      </g>
      <circle cx="9" cy="15.5" r="1.7" fill="#fcebc9"/>
      <g fill="#e0664a">
        <ellipse cx="18" cy="5.7" rx="1.5" ry="2.3" transform="rotate(0 18 8)"/>
        <ellipse cx="18" cy="5.7" rx="1.5" ry="2.3" transform="rotate(72 18 8)"/>
        <ellipse cx="18" cy="5.7" rx="1.5" ry="2.3" transform="rotate(144 18 8)"/>
        <ellipse cx="18" cy="5.7" rx="1.5" ry="2.3" transform="rotate(216 18 8)"/>
        <ellipse cx="18" cy="5.7" rx="1.5" ry="2.3" transform="rotate(288 18 8)"/>
      </g>
      <circle cx="18" cy="8" r="1.15" fill="#fcebc9"/>
    </symbol>
  </svg>

  <div class="card">
    <div class="art"><img src="scene.png" alt="Pointillist landscape" style="object-position: 40% 55%;" /></div>

    <div class="panel">
      <a class="back" href="index.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2"/></svg>
        Back
      </a>

      <p class="login-to">Login to</p>
      <h1>Where Estate<br />Comes Easy</h1>

      <form onsubmit="return false">
        <input class="field" type="email" placeholder="Enter email" autocomplete="email" />
        <input class="field" type="password" placeholder="Enter password" autocomplete="current-password" />
      </form>
      <p class="signup">Don't have an account? <a href="#">Sign up</a></p>

      <div class="foot">
        <span class="lockup"><svg class="logo-mark"><use href="#pmark"/></svg> PAMANA</span>
        <span class="tag">Shared Estate Profession for An Easier Journey.</span>
      </div>
    </div>
  </div>
</body>
</html>
